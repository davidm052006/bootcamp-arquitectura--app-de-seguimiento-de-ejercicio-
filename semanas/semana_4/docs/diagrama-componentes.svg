<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="650" viewBox="0 0 1100 650">
  <style>
    .title{font: 700 18px Arial; fill:#111;}
    .label{font: 14px Arial; fill:#111;}
    .small{font: 12px Arial; fill:#333;}
    .box{fill:#f7f7ff; stroke:#4b6cb7; stroke-width:2;}
    .box2{fill:#f7fff7; stroke:#2f855a; stroke-width:2;}
    .box3{fill:#fff7f7; stroke:#c53030; stroke-width:2;}
    .arrow{stroke:#444; stroke-width:2; marker-end:url(#m);}
  </style>

  <defs>
    <marker id="m" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#444"/>
    </marker>
  </defs>

  <text x="20" y="35" class="title">Diagrama de Componentes - Seguimiento de Ejercicios</text>

  <!-- Row 1 -->
  <rect x="20" y="80" width="240" height="70" rx="10" class="box3"/>
  <text x="35" y="110" class="label">Cliente</text>
  <text x="35" y="130" class="small">Postman / navegador</text>

  <!-- Row 2 -->
  <rect x="300" y="80" width="260" height="70" rx="10" class="box"/>
  <text x="315" y="110" class="label">Express Routes</text>
  <text x="315" y="130" class="small">URLs -> Controller</text>

  <!-- Row 3 -->
  <rect x="610" y="80" width="190" height="70" rx="10" class="box"/>
  <text x="625" y="110" class="label">Controllers</text>
  <text x="625" y="130" class="small">req/res (JSON)</text>

  <!-- Row 4 -->
  <rect x="820" y="80" width="260" height="70" rx="10" class="box2"/>
  <text x="835" y="110" class="label">Services</text>
  <text x="835" y="130" class="small">reglas (1 rutina activa)</text>

  <!-- Domain/Repo -->
  <rect x="140" y="220" width="320" height="80" rx="10" class="box2"/>
  <text x="160" y="255" class="label">Repositories (Memoria)</text>
  <text x="160" y="275" class="small">Map + CRUD</text>

  <rect x="500" y="220" width="230" height="80" rx="10" class="box2"/>
  <text x="515" y="255" class="label">Entities</text>
  <text x="515" y="275" class="small">User / Routine</text>

  <rect x="760" y="220" width="340" height="80" rx="10" class="box"/>
  <text x="780" y="255" class="label">Swagger / OpenAPI</text>
  <text x="780" y="275" class="small">Docs en /api-docs</text>

  <!-- Arrows -->
  <line x1="260" y1="115" x2="300" y2="115" class="arrow"/>
  <line x1="560" y1="115" x2="610" y2="115" class="arrow"/>
  <line x1="800" y1="115" x2="820" y2="115" class="arrow"/>

  <line x1="900" y1="160" x2="900" y2="220" class="arrow"/>
  <line x1="300" y1="160" x2="300" y2="220" class="arrow" opacity="0.4"/>
  <line x1="680" y1="160" x2="680" y2="220" class="arrow"/>

  <!-- Errors -->
  <rect x="20" y="460" width="430" height="110" rx="10" class="box3"/>
  <text x="40" y="490" class="label">Manejo de errores centralizado</text>
  <text x="40" y="515" class="small">ApiError (statusCode) -> middleware errorHandler</text>
  <text x="40" y="540" class="small">Respuesta: {success:false, error:{message,statusCode}, timestamp}</text>

  <!-- Arrow to error handler -->
  <line x1="450" y1="505" x2="610" y2="505" class="arrow"/>
  <rect x="610" y="460" width="470" height="110" rx="10" class="box"/>
  <text x="630" y="490" class="label">JSON estándar</text>
  <text x="630" y="515" class="small">success:true + timestamp + data/meta</text>
  <text x="630" y="540" class="small">y CRUD/filters/paginación</text>
</svg>

